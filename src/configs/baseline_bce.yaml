# Baseline BCE configuration.

data:
  csv_path: src/data/csv_dataset/fungtion_dataset.csv
  embedding_dir: src/data/embeddings/prott5_dropout_variants_packed
  results_dir: results/baseline_bce

features:
  normalize: true
  pooling_type: mean

model:
  type: simple_predictor
  input_dim: 1024
  output_dim: 1
  dropout_rate: 0.2
  use_contrastive: false
  encoder_hidden_dim: 512

training:
  batch_size: 1024
  num_folds: 5
  threshold_method: youden
  target_recall: 0.85
  num_epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.01
  warmup_epochs: 5
  early_stopping_patience: 6
  grad_clip_value: 2.0
  use_variants: false
  loss_type: bce
  label_smoothing: 0.0
  monitor_metric: roc_auc
  mode: max
  lr_scheduler:
    scheduler_type: cosine
    eta_min: 1e-7

output:
  save_checkpoints: true
  plot_training_curves: true

hardware:
  gpu_id: 0
  random_seed: 42
  deterministic: false
  debug_logging: true
